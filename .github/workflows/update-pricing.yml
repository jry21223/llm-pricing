name: Update LLM Pricing Daily

on:
  schedule:
    # Run daily at UTC 08:00 (北京时间 16:00)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update pricing data
        run: node update-pricing.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pricing.json
          git diff --staged --quiet || git commit -m "auto: update pricing data $(date +%Y-%m-%d)"
          git push
