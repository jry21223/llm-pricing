name: Update LLM Pricing Daily

on:
  schedule:
    # Run daily at UTC 08:00 (北京时间 16:00)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

env:
  DAILY_PR_TITLE_PREFIX: "auto: update pricing data"

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update pricing data
        run: node update-pricing.js

      - name: Create pull request and enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          node api/generate.js

          git add pricing.json sources.json api/v1/
          if git diff --staged --quiet; then
            echo "No pricing changes detected."
            exit 0
          fi

          branch="auto/pricing-update-$(date +%Y-%m-%d)-${GITHUB_RUN_ID}"
          git switch -c "$branch"
          git commit -m "auto: update pricing data $(date +%Y-%m-%d)"
          git push --set-upstream origin "$branch"

          pr_url="$(gh pr create \
            --base main \
            --head "$branch" \
            --title "${DAILY_PR_TITLE_PREFIX} $(date +%Y-%m-%d)" \
            --body "Automated daily pricing data refresh.")"

          gh pr merge "$pr_url" --auto --squash --delete-branch

  process-open-prs:
    needs: update-pricing
    if: '!cancelled()'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Process open daily pricing update PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          search_query="author:github-actions[bot] \"${DAILY_PR_TITLE_PREFIX}\" in:title"
          prs="$(gh pr list \
            --base main \
            --state open \
            --search "$search_query" \
            --json number,isDraft | jq -r '.[] | select(.isDraft | not) | .number')"

          if [ -z "$prs" ]; then
            echo "No open daily update PRs found."
            exit 0
          fi

          while IFS= read -r pr; do
            [ -z "$pr" ] && continue
            echo "Processing PR #$pr"
            gh pr merge "$pr" --auto --squash --delete-branch || echo "Could not enable auto-merge for PR #$pr."
          done <<< "$prs"
